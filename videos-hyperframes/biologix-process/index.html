<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=1920, height=1080" />
    <script src="https://cdn.jsdelivr.net/npm/gsap@3.14.2/dist/gsap.min.js"></script>
    <style>
      * { margin: 0; padding: 0; box-sizing: border-box; }
      html, body { width: 1920px; height: 1080px; overflow: hidden; background-color: #0A0F1F; }
      #root { position: relative; width: 1920px; height: 1080px; overflow: hidden; background-color: #0A0F1F; }
      .soft-transition { position: absolute; inset: 0; z-index: 20; pointer-events: none; background: #0A0F1F; opacity: 0; }
      .soft-transition::after { content: ""; position: absolute; left: -20%; right: -20%; top: 50%; height: 3px; background: linear-gradient(90deg, rgba(147,197,253,0), rgba(147,197,253,0.75), rgba(147,197,253,0)); box-shadow: 0 0 42px rgba(59,130,246,0.8); transform: translateY(-50%); }
      .final-fade { position: absolute; inset: 0; z-index: 30; background: #0A0F1F; opacity: 0; pointer-events: none; }
</style>
  </head>
  <body>
    <div id="root" data-composition-id="main" data-start="0" data-duration="71" data-width="1920" data-height="1080">
      <div id="scene-1-host" data-composition-id="scene-1" data-composition-src="compositions/scene-1.html" data-start="0" data-duration="15" data-track-index="1"></div>
      <div id="scene-2-host" data-composition-id="scene-2" data-composition-src="compositions/scene-2.html" data-start="14" data-duration="15" data-track-index="2"></div>
      <div id="scene-3-host" data-composition-id="scene-3" data-composition-src="compositions/scene-3.html" data-start="28" data-duration="15" data-track-index="3"></div>
      <div id="scene-4-host" data-composition-id="scene-4" data-composition-src="compositions/scene-4.html" data-start="42" data-duration="15" data-track-index="4"></div>
      <div id="scene-5-host" data-composition-id="scene-5" data-composition-src="compositions/scene-5.html" data-start="56" data-duration="15" data-track-index="5"></div>
      
      <div id="fade-1" class="soft-transition"></div>
      <div id="fade-2" class="soft-transition"></div>
      <div id="fade-3" class="soft-transition"></div>
      <div id="fade-4" class="soft-transition"></div>
      <div id="final-fade" class="final-fade clip" data-start="70.25" data-duration="0.65" data-track-index="10"></div>
    </div>
    <script>
      window.__timelines = window.__timelines || {};
      const tl = gsap.timeline({ paused: true });
      function softFade(id, start) {
        tl.fromTo(id, { opacity: 0 }, { opacity: 0.68, duration: 0.75, ease: "sine.inOut" }, start);
        tl.to(id, { opacity: 0, duration: 0.95, ease: "sine.inOut" }, start + 0.8);
      }
      softFade("#fade-1", 13.0);
      softFade("#fade-2", 27.0);
      softFade("#fade-3", 41.0);
      softFade("#fade-4", 55.0);
      tl.to("#final-fade", { opacity: 1, duration: 0.62, ease: "sine.inOut" }, 70.28);
      window.__timelines["main"] = tl;
    </script>
  </body>
</html>
